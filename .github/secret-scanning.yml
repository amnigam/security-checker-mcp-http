# Secret Scanning Exclusions
# ===========================
# This file tells GitHub's secret scanning to automatically close
# alerts for secrets found in the paths listed below.
#
# WHY THESE EXCLUSIONS EXIST:
# The tests/fixtures/ directory contains files with deliberately
# planted fake secrets used to test the security-checker-mcp tool.
# Every secret in these files is spurious:
#   - AWS keys use the official AWS documentation example (AKIAIOSFODNN7EXAMPLE)
#   - Stripe keys are from Stripe's public documentation
#   - GitHub tokens use sequential alphabet characters
#   - Database URLs point to example.com (IANA reserved) or .internal (non-routable)
#   - All other values are obvious placeholders
#
# These files MUST contain realistic-looking secrets so the
# scan_secrets tool can be tested against known patterns.
#
# REVIEW SCHEDULE: Review this file when adding new test fixtures
# or modifying existing ones. Do not add production paths here.
#
# CONTACT: AppSec team

paths-ignore:
  # Test fixtures with deliberate fake secrets for tool validation
  - 'tests/fixtures/**'
  - 'tests/fixtures/.env.test'
