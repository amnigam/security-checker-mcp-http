# Vulnerable nginx configuration — TEST FIXTURE ONLY.
# Contains deliberate security misconfigurations.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # CR-04.1: TLS 1.0 and 1.1 enabled (PROHIBITED)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;

    # SH-01.1: Missing HSTS header
    # (Strict-Transport-Security not configured)

    # SH-07.1: Wildcard CORS (PROHIBITED for authenticated endpoints)
    add_header Access-Control-Allow-Origin *;

    # SH-03.1: Missing X-Frame-Options
    # (clickjacking protection not configured)

    # SH-04.1: Missing X-Content-Type-Options
    # (MIME sniffing protection not configured)

    server {
        listen 80;
        listen 443 ssl;
        server_name example.com;

        ssl_certificate /etc/ssl/cert.pem;
        ssl_certificate_key /etc/ssl/key.pem;

        # EL-01.1: Server version exposed
        server_tokens on;

        location / {
            proxy_pass http://backend:8000;

            # No security headers configured
            # Missing: CSP, Referrer-Policy, Permissions-Policy
        }

        location /api/ {
            proxy_pass http://api-backend:3000;

            # SH-07.2: credentials with wildcard origin
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Allow-Origin *;
        }

        # Directory listing enabled (information disclosure)
        location /static/ {
            autoindex on;
            alias /var/www/static/;
        }
    }
}
